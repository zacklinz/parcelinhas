<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gastos 2025</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --border2: #444c56;
    --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
    --green: #238636; --green2: #2ea043;
    --radius: 10px; --radius-sm: 6px;
    --font: system-ui, -apple-system, sans-serif;
    --caixa-bg:#0d2847;  --caixa-tag:#1f6feb;  --caixa-pill-bg:#1c3a5e;  --caixa-pill-text:#79b8ff;
    --inter-bg:#2d1200;  --inter-tag:#e06030;  --inter-pill-bg:#4a1c08;  --inter-pill-text:#ffa07a;
    --itau-bg:#2b1d00;   --itau-tag:#d4a017;   --itau-pill-bg:#4a3000;   --itau-pill-text:#ffd700;
    --cl-bg:#1a1040;     --cl-tag:#8b5cf6;     --cl-pill-bg:#2e1f5e;     --cl-pill-text:#c4b5fd;
    --afinz-bg:#052018;  --afinz-tag:#10b981;  --afinz-pill-bg:#083828;  --afinz-pill-text:#6ee7b7;
  }

  body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; line-height:1.6; min-height:100vh; }

  /* ── Login screen ── */
  #login-screen {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; gap:1.5rem; padding:2rem;
  }
  #login-screen h1 { font-size:24px; font-weight:600; letter-spacing:-0.5px; }
  #login-screen p  { color:var(--text2); font-size:14px; text-align:center; max-width:320px; }
  .btn-google {
    display:flex; align-items:center; gap:10px;
    background:var(--bg2); border:1px solid var(--border2);
    border-radius:var(--radius-sm); color:var(--text);
    font-size:14px; font-weight:500; padding:10px 20px;
    cursor:pointer; transition:background 0.15s;
  }
  .btn-google:hover { background:var(--bg3); }
  .btn-google svg { flex-shrink:0; }

  /* ── App ── */
  #app-screen { display:none; }

  header {
    background:var(--bg2); border-bottom:1px solid var(--border);
    padding:0.875rem 2rem; display:flex; align-items:center; gap:12px;
  }
  header h1   { font-size:15px; font-weight:600; flex:1; }
  header span { font-size:12px; color:var(--text2); }
  .user-info  { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); }
  .user-info img { width:24px; height:24px; border-radius:50%; border:1px solid var(--border); }
  .btn-logout { background:none; border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text2); font-size:11px; padding:3px 8px; cursor:pointer; }
  .btn-logout:hover { border-color:var(--border2); color:var(--text); }

  main { max-width:1100px; margin:0 auto; padding:2rem; }

  .metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:1.5rem; }
  .metric-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.25rem; }
  .metric-card .label { font-size:12px; color:var(--text2); margin-bottom:6px; }
  .metric-card .value { font-size:24px; font-weight:600; letter-spacing:-0.5px; }

  .panel { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; margin-bottom:1.25rem; }
  .panel-title { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:1rem; }

  .form-grid { display:grid; grid-template-columns:2.5fr 1fr 1fr 1fr 1fr auto; gap:10px; align-items:end; }
  .form-group label { display:block; font-size:11px; color:var(--text2); margin-bottom:4px; }
  input, select {
    width:100%; background:var(--bg3); border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text); font-size:13px;
    padding:7px 10px; outline:none; transition:border-color 0.15s;
  }
  input:focus, select:focus { border-color:var(--border2); }
  input::placeholder { color:var(--text3); }
  select option { background:var(--bg3); }
  button.primary {
    background:var(--green); border:1px solid var(--green2); border-radius:var(--radius-sm);
    color:#fff; font-size:13px; font-weight:600; padding:8px 16px;
    cursor:pointer; white-space:nowrap; transition:background 0.15s; height:36px;
  }
  button.primary:hover { background:var(--green2); }

  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; min-width:750px; }
  thead th { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.3px; padding:8px 10px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; }
  thead th:first-child, thead th:nth-child(2) { text-align:left; }
  td { padding:7px 10px; border-bottom:1px solid var(--border); text-align:right; vertical-align:middle; }
  td:first-child { text-align:left; }
  td:nth-child(2) { text-align:center; }
  tfoot td { padding:9px 10px; border-top:2px solid var(--border2); font-size:12px; font-weight:600; color:var(--text2); }

  .pill { font-size:11px; font-weight:600; padding:2px 10px; border-radius:20px; display:inline-block; white-space:nowrap; }
  .badge-n { font-size:10px; color:var(--text2); background:var(--bg3); border:1px solid var(--border); padding:1px 6px; border-radius:4px; margin-left:4px; }
  .del-btn { background:none; border:none; color:var(--text3); cursor:pointer; font-size:16px; padding:0 2px; line-height:1; transition:color 0.1s; }
  .del-btn:hover { color:#f85149; }
  .val-empty { color:var(--text3); }

  .row-Caixa td { background:var(--caixa-bg); }
  .row-Inter td { background:var(--inter-bg); }
  .row-Itaú  td { background:var(--itau-bg);  }
  .row-CL    td { background:var(--cl-bg);    }
  .row-Afinz td { background:var(--afinz-bg); }
  .pill-Caixa { background:var(--caixa-pill-bg); color:var(--caixa-pill-text); }
  .pill-Inter { background:var(--inter-pill-bg); color:var(--inter-pill-text); }
  .pill-Itaú  { background:var(--itau-pill-bg);  color:var(--itau-pill-text);  }
  .pill-CL    { background:var(--cl-pill-bg);    color:var(--cl-pill-text);    }
  .pill-Afinz { background:var(--afinz-pill-bg); color:var(--afinz-pill-text); }

  .chart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .chart-title  { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
  .legend { display:flex; flex-wrap:wrap; gap:14px; }
  .legend-item  { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text2); }
  .legend-dot   { width:10px; height:10px; border-radius:2px; display:inline-block; }
  .chart-canvas-wrap { position:relative; width:100%; height:220px; }

  .empty-state { text-align:center; color:var(--text3); padding:2.5rem; font-size:13px; }

  .saving-indicator { font-size:11px; color:var(--text3); padding:0 2rem 0.5rem; text-align:right; }
  .saving-indicator.active { color:var(--green2); }

  @media (max-width:700px) {
    main { padding:1rem; }
    .form-grid { grid-template-columns:1fr 1fr; }
    .form-grid > *:first-child { grid-column:1 / -1; }
    .form-grid > button { grid-column:1 / -1; width:100%; height:40px; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
  </svg>
  <h1>Gastos 2025</h1>
  <p>Entre com sua conta Google para acessar e sincronizar seus gastos em qualquer dispositivo.</p>
  <button class="btn-google" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.9 6.5 29.2 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3 0 5.7 1.1 7.8 2.9l5.7-5.7C33.9 6.5 29.2 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36.5 24 36.5c-5.2 0-9.6-3.4-11.2-8.1l-6.5 5C9.5 39.7 16.3 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C40.8 35.4 44 30.1 44 24c0-1.3-.1-2.7-.4-4z"/>
    </svg>
    Entrar com Google
  </button>
</div>

<!-- ── APP ── -->
<div id="app-screen">
  <header>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
    </svg>
    <h1>Gastos 2025 &mdash; Maio → Dezembro</h1>
    <div class="user-info">
      <img id="user-photo" src="" alt="" />
      <span id="user-name"></span>
      <button class="btn-logout" onclick="signOut()">Sair</button>
    </div>
  </header>

  <div class="saving-indicator" id="saving-indicator"></div>

  <main>
    <div class="metrics" id="metrics"></div>

    <div class="panel">
      <div class="panel-title">Novo gasto</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Descrição</label>
          <input type="text" id="inp-desc" placeholder="Ex: Netflix, Aluguel…" />
        </div>
        <div class="form-group">
          <label>Valor (R$)</label>
          <input type="number" id="inp-valor" placeholder="0,00" step="0.01" min="0" />
        </div>
        <div class="form-group">
          <label>Cartão</label>
          <select id="inp-cartao">
            <option>Caixa</option><option>Inter</option><option>Itaú</option><option>CL</option><option>Afinz</option>
          </select>
        </div>
        <div class="form-group">
          <label>Parcelas</label>
          <input type="number" id="inp-parcelas" value="1" min="1" max="8" step="1" />
        </div>
        <div class="form-group">
          <label>Início</label>
          <select id="inp-inicio">
            <option value="0">Mai</option><option value="1">Jun</option><option value="2">Jul</option>
            <option value="3">Ago</option><option value="4">Set</option><option value="5">Out</option>
            <option value="6">Nov</option><option value="7">Dez</option>
          </select>
        </div>
        <button class="primary" onclick="addExpense()">+ Adicionar</button>
      </div>
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table id="main-table"></table>
      </div>
    </div>

    <div class="panel" id="chart-wrap" style="display:none;">
      <div class="chart-header">
        <span class="chart-title">Total por mês</span>
        <div class="legend" id="legend"></div>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="chart" role="img" aria-label="Gráfico de barras empilhadas com gastos mensais por cartão"></canvas>
      </div>
    </div>
  </main>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// 🔧 COLE AQUI A SUA CONFIG DO FIREBASE
//    (Firebase Console → Configurações do projeto → Seus apps)
// ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "COLE_AQUI",
  authDomain:        "COLE_AQUI",
  projectId:         "COLE_AQUI",
  storageBucket:     "COLE_AQUI",
  messagingSenderId: "COLE_AQUI",
  appId:             "COLE_AQUI"
};
// ─────────────────────────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

const MESES   = ['Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const CARTOES = ['Caixa','Inter','Itaú','CL','Afinz'];
const CHART_COLORS = { 'Caixa':'#1f6feb','Inter':'#e06030','Itaú':'#d4a017','CL':'#8b5cf6','Afinz':'#10b981' };

let expenses  = [];
let chartInst = null;
let userId    = null;
let unsub     = null;

// ── Auth ──────────────────────────────────────────────────────
function signIn() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
function signOut() {
  if (unsub) unsub();
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  if (user) {
    userId = user.uid;
    document.getElementById('login-screen').style.display  = 'none';
    document.getElementById('app-screen').style.display    = 'block';
    document.getElementById('user-name').textContent       = user.displayName;
    document.getElementById('user-photo').src              = user.photoURL;
    startListening();
  } else {
    userId = null;
    expenses = [];
    document.getElementById('login-screen').style.display  = 'flex';
    document.getElementById('app-screen').style.display    = 'none';
  }
});

// ── Firestore ─────────────────────────────────────────────────
function col() {
  return db.collection('users').doc(userId).collection('gastos2025');
}

function startListening() {
  if (unsub) unsub();
  unsub = col().orderBy('createdAt', 'asc').onSnapshot(snap => {
    expenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

function setSaving(msg, active = false) {
  const el = document.getElementById('saving-indicator');
  el.textContent = msg;
  el.className = 'saving-indicator' + (active ? ' active' : '');
}

async function addExpense() {
  const desc     = document.getElementById('inp-desc').value.trim();
  const valor    = parseFloat(document.getElementById('inp-valor').value);
  const cartao   = document.getElementById('inp-cartao').value;
  const parcelas = Math.min(8, Math.max(1, parseInt(document.getElementById('inp-parcelas').value) || 1));
  const inicio   = parseInt(document.getElementById('inp-inicio').value);
  if (!desc || isNaN(valor) || valor <= 0) { document.getElementById('inp-desc').focus(); return; }

  const pv     = Math.round(valor * 100) / 100;
  const values = Array(8).fill(0);
  for (let i = 0; i < parcelas && (inicio + i) < 8; i++) values[inicio + i] = pv;

  setSaving('Salvando…', true);
  try {
    await col().add({ desc, cartao, parcelas, inicio, values, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    setSaving('Salvo ✓', true);
    setTimeout(() => setSaving(''), 2000);
  } catch(e) {
    setSaving('Erro ao salvar. Tente novamente.');
  }

  document.getElementById('inp-desc').value    = '';
  document.getElementById('inp-valor').value   = '';
  document.getElementById('inp-parcelas').value = '1';
  document.getElementById('inp-desc').focus();
}

async function deleteExpense(id) {
  if (!confirm('Remover este gasto?')) return;
  setSaving('Removendo…', true);
  await col().doc(id).delete();
  setSaving('Removido ✓', true);
  setTimeout(() => setSaving(''), 2000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !['BUTTON','SELECT'].includes(document.activeElement.tagName)) addExpense();
});

// ── Render ────────────────────────────────────────────────────
function render() { renderMetrics(); renderTable(); renderChart(); }

function fmtR(v) { return v > 0 ? 'R$&nbsp;' + v.toFixed(2).replace('.', ',') : '<span class="val-empty">—</span>'; }
function fmtRaw(v) { return 'R$\u00a0' + v.toFixed(2).replace('.', ','); }

function renderMetrics() {
  const totals   = MESES.map((_, i) => expenses.reduce((s, e) => s + (e.values[i] || 0), 0));
  const totalAno = totals.reduce((a, b) => a + b, 0);
  const mi       = Math.min(Math.max(new Date().getMonth() - 4, 0), 7);
  const maiorIdx = totals.indexOf(Math.max(...totals));

  document.getElementById('metrics').innerHTML = [
    ['Total do ano',          fmtRaw(totalAno)],
    [MESES[mi] + ' — atual',  fmtRaw(totals[mi])],
    ['Gastos parcelados',     expenses.filter(e => e.parcelas > 1).length],
    ['Mês mais caro',         totals[maiorIdx] > 0 ? MESES[maiorIdx] : '—'],
  ].map(([label, value]) => `
    <div class="metric-card">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
    </div>`).join('');
}

function renderTable() {
  const t   = document.getElementById('main-table');
  const b   = 'border-bottom:1px solid var(--border);';
  const thS = `font-size:11px;font-weight:600;color:var(--text2);padding:8px 10px;${b}`;

  let html = `<thead><tr>
    <th style="${thS}text-align:left;">Descrição</th>
    <th style="${thS}text-align:center;">Cartão</th>
    ${MESES.map(m => `<th style="${thS}text-align:right;">${m}</th>`).join('')}
    <th style="${b}width:24px;"></th>
  </tr></thead>`;

  if (expenses.length === 0) {
    html += `<tbody><tr><td colspan="${3 + MESES.length}" class="empty-state">Nenhum gasto ainda. Adicione o primeiro acima ↑</td></tr></tbody>`;
  } else {
    html += '<tbody>' + expenses.map(e => `
      <tr class="row-${e.cartao}">
        <td>${e.desc}${e.parcelas > 1 ? `<span class="badge-n">${e.parcelas}x</span>` : ''}</td>
        <td><span class="pill pill-${e.cartao}">${e.cartao}</span></td>
        ${e.values.map(v => `<td>${fmtR(v)}</td>`).join('')}
        <td><button class="del-btn" onclick="deleteExpense('${e.id}')" title="Remover">&times;</button></td>
      </tr>`).join('') + '</tbody>';
  }

  const totals = MESES.map((_, i) => expenses.reduce((s, e) => s + (e.values[i] || 0), 0));
  html += `<tfoot><tr>
    <td>Total mensal</td><td></td>
    ${totals.map(v => `<td style="text-align:right;color:${v > 0 ? 'var(--text)' : 'var(--text3)'};">${fmtR(v)}</td>`).join('')}
    <td></td>
  </tr></tfoot>`;

  t.innerHTML = html;
}

function renderChart() {
  const wrap = document.getElementById('chart-wrap');
  if (expenses.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  const active = CARTOES.filter(c => expenses.some(e => e.cartao === c));
  document.getElementById('legend').innerHTML = active.map(c =>
    `<span class="legend-item"><span class="legend-dot" style="background:${CHART_COLORS[c]}"></span>${c}</span>`
  ).join('');

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const datasets = CARTOES.map(cartao => ({
    label: cartao,
    data: MESES.map((_, i) => Math.round(expenses.filter(e => e.cartao === cartao).reduce((s, e) => s + (e.values[i] || 0), 0) * 100) / 100),
    backgroundColor: CHART_COLORS[cartao],
    borderRadius: 4, borderSkipped: false,
  })).filter(ds => ds.data.some(v => v > 0));

  chartInst = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels: MESES, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#161b22', borderColor:'#30363d', borderWidth:1,
          titleColor:'#e6edf3', bodyColor:'#8b949e',
          callbacks: { label: ctx => `${ctx.dataset.label}: R$\u00a0${ctx.raw.toFixed(2).replace('.', ',')}` }
        }
      },
      scales: {
        x: { stacked:true, grid:{display:false}, ticks:{font:{size:12},color:'#8b949e'}, border:{color:'#30363d'} },
        y: { stacked:true, border:{display:false}, grid:{color:'#21262d'},
          ticks:{font:{size:11},color:'#8b949e', callback: v => 'R$' + v.toLocaleString('pt-BR')} }
      }
    }
  });
}
</script>
</body>
</html>
