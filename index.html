<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Parcelinhas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js">
// ── Gastos Fixos ───────────────────────────────────────────────
let fixedItems   = [];
let chartFixInst = null;
let unsubFixed   = null;

function colFixed() {
  return db.collection('users').doc(userId).collection('fixos').doc(String(currentYear)).collection('items');
}

function startListeningFixed() {
  if (unsubFixed) unsubFixed();
  unsubFixed = colFixed().orderBy('createdAt', 'asc').onSnapshot(snap => {
    fixedItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderFixed();
  });
}

async function addFixed() {
  const desc  = document.getElementById('fix-desc').value.trim();
  const valor = parseFloat(document.getElementById('fix-valor').value);
  if (!desc || isNaN(valor) || valor <= 0) { document.getElementById('fix-desc').focus(); return; }
  const pv     = Math.round(valor * 100) / 100;
  const values = Array(12).fill(pv);
  setSaving('Salvando…', true);
  try {
    await colFixed().add({ desc, defaultValue: pv, values, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    setSaving('Salvo ✓', true);
    setTimeout(() => setSaving(''), 2000);
  } catch(e) { setSaving('Erro ao salvar.'); }
  document.getElementById('fix-desc').value  = '';
  document.getElementById('fix-valor').value = '';
  document.getElementById('fix-desc').focus();
}

async function deleteFixed(id) {
  if (!confirm('Remover este gasto fixo?')) return;
  setSaving('Removendo…', true);
  await colFixed().doc(id).delete();
  setSaving('Removido ✓', true);
  setTimeout(() => setSaving(''), 2000);
}

async function updateFixedCell(id, monthIdx, newVal) {
  const item = fixedItems.find(f => f.id === id);
  if (!item) return;
  const values = [...item.values];
  values[monthIdx] = Math.round((parseFloat(newVal) || 0) * 100) / 100;
  setSaving('Salvando…', true);
  try {
    await colFixed().doc(id).update({ values });
    setSaving('Salvo ✓', true);
    setTimeout(() => setSaving(''), 2000);
  } catch(e) { setSaving('Erro ao salvar.'); }
}

function startEditCell(el, id, monthIdx, currentVal) {
  if (el.querySelector('input')) return;
  const inp = document.createElement('input');
  inp.type  = 'number';
  inp.step  = '0.01';
  inp.value = currentVal > 0 ? currentVal.toFixed(2) : '';
  inp.placeholder = '0,00';
  el.appendChild(inp);
  inp.focus();
  inp.select();
  function commit() {
    const v = parseFloat(inp.value);
    if (!isNaN(v) && v !== currentVal) updateFixedCell(id, monthIdx, v);
    inp.remove();
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { inp.blur(); }
    if (e.key === 'Escape') { inp.remove(); }
    e.stopPropagation();
  });
}

function renderFixed() {
  renderMetricsFixed();
  renderTableFixed();
  renderChartFixed();
}

function renderMetricsFixed() {
  const totals   = MESES.map((_, i) => fixedItems.reduce((s, f) => s + (f.values[i] || 0), 0));
  const totalAno = totals.reduce((a, b) => a + b, 0);
  const mi       = new Date().getMonth();
  const maiorIdx = totals.indexOf(Math.max(...totals));
  document.getElementById('metrics-fixos').innerHTML = [
    ['Total fixo ' + currentYear, fmtRaw(totalAno)],
    [MESES[mi] + ' — mês atual',  fmtRaw(totals[mi])],
    ['Contas cadastradas',         fixedItems.length],
    ['Mês mais pesado',            totals[maiorIdx] > 0 ? MESES[maiorIdx] : '—'],
  ].map(([label, value]) => `
    <div class="metric-card">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
    </div>`).join('');
}

function renderTableFixed() {
  const t = document.getElementById('fixed-table');
  const b = 'border-bottom:1px solid var(--border);';
  const thS = `font-size:11px;font-weight:600;color:var(--text2);padding:7px 8px;${b}`;
  let html = `<thead><tr>
    <th style="${thS}text-align:left;">Descrição</th>
    ${MESES.map(m => `<th style="${thS}text-align:right;">${m}</th>`).join('')}
    <th style="${b}width:24px;"></th>
  </tr></thead>`;

  if (fixedItems.length === 0) {
    html += `<tbody><tr><td colspan="${2+MESES.length}" class="empty-state">Nenhum gasto fixo em ${currentYear}. Adicione o primeiro acima ↑</td></tr></tbody>`;
  } else {
    html += '<tbody>' + fixedItems.map(f => `
      <tr>
        <td style="${b}font-size:13px;">${f.desc}</td>
        ${f.values.map((v, i) => `
          <td class="editable-cell" style="${b}position:relative;" onclick="startEditCell(this,'${f.id}',${i},${v})">
            ${fmtR(v)}
          </td>`).join('')}
        <td style="${b}"><button class="del-btn" onclick="deleteFixed('${f.id}')" title="Remover">&times;</button></td>
      </tr>`).join('') + '</tbody>';
  }

  const totals = MESES.map((_, i) => fixedItems.reduce((s, f) => s + (f.values[i] || 0), 0));
  html += `<tfoot><tr>
    <td>Total mensal</td>
    ${totals.map(v => `<td style="text-align:right;color:${v > 0 ? 'var(--text)' : 'var(--text3)'};">${fmtR(v)}</td>`).join('')}
    <td></td>
  </tr></tfoot>`;
  t.innerHTML = html;
}

function renderChartFixed() {
  const wrap = document.getElementById('chart-wrap-fixos');
  if (fixedItems.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  if (chartFixInst) { chartFixInst.destroy(); chartFixInst = null; }
  const totals = MESES.map((_, i) => Math.round(fixedItems.reduce((s, f) => s + (f.values[i] || 0), 0) * 100) / 100);
  chartFixInst = new Chart(document.getElementById('chart-fixos'), {
    type: 'line',
    data: {
      labels: MESES,
      datasets: [{
        label: 'Total fixo',
        data: totals,
        borderColor: '#2ea043',
        backgroundColor: 'rgba(46,160,67,0.1)',
        borderWidth: 2,
        pointBackgroundColor: '#2ea043',
        pointRadius: 4,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#161b22', borderColor:'#30363d', borderWidth:1,
          titleColor:'#e6edf3', bodyColor:'#8b949e',
          callbacks: { label: ctx => `Total: R$\u00a0${ctx.raw.toFixed(2).replace('.', ',')}` }
        }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:11},color:'#8b949e'}, border:{color:'#30363d'} },
        y: { border:{display:false}, grid:{color:'#21262d'},
          ticks:{font:{size:11},color:'#8b949e', callback: v => 'R$' + v.toLocaleString('pt-BR')} }
      }
    }
  });
}
</script>

function startEditCell(el, id, monthIdx, currentVal) {
  if (el.querySelector('input')) return;
  const inp = document.createElement('input');
  inp.type  = 'number';
  inp.step  = '0.01';
  inp.value = currentVal > 0 ? currentVal.toFixed(2) : '';
  inp.placeholder = '0,00';
  el.appendChild(inp);
  inp.focus();
  inp.select();
  function commit() {
    const v = parseFloat(inp.value);
    if (!isNaN(v) && v !== currentVal) updateFixedCell(id, monthIdx, v);
    inp.remove();
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { inp.blur(); }
    if (e.key === 'Escape') { inp.remove(); }
    e.stopPropagation();
  });
}

function renderFixed() {
  renderMetricsFixed();
  renderTableFixed();
  renderChartFixed();
}

function renderMetricsFixed() {
  const totals   = MESES.map((_, i) => fixedItems.reduce((s, f) => s + (f.values[i] || 0), 0));
  const totalAno = totals.reduce((a, b) => a + b, 0);
  const mi       = new Date().getMonth();
  const maiorIdx = totals.indexOf(Math.max(...totals));
  document.getElementById('metrics-fixos').innerHTML = [
    ['Total fixo ' + currentYear, fmtRaw(totalAno)],
    [MESES[mi] + ' — mês atual',  fmtRaw(totals[mi])],
    ['Contas cadastradas',         fixedItems.length],
    ['Mês mais pesado',            totals[maiorIdx] > 0 ? MESES[maiorIdx] : '—'],
  ].map(([label, value]) => `
    <div class="metric-card">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
    </div>`).join('');
}

function renderTableFixed() {
  const t = document.getElementById('fixed-table');
  const b = 'border-bottom:1px solid var(--border);';
  const thS = `font-size:11px;font-weight:600;color:var(--text2);padding:7px 8px;${b}`;
  let html = `<thead><tr>
    <th style="${thS}text-align:left;">Descrição</th>
    ${MESES.map(m => `<th style="${thS}text-align:right;">${m}</th>`).join('')}
    <th style="${b}width:24px;"></th>
  </tr></thead>`;

  if (fixedItems.length === 0) {
    html += `<tbody><tr><td colspan="${2+MESES.length}" class="empty-state">Nenhum gasto fixo em ${currentYear}. Adicione o primeiro acima ↑</td></tr></tbody>`;
  } else {
    html += '<tbody>' + fixedItems.map(f => `
      <tr>
        <td style="${b}font-size:13px;">${f.desc}</td>
        ${f.values.map((v, i) => `
          <td class="editable-cell" style="${b}position:relative;" onclick="startEditCell(this,'${f.id}',${i},${v})">
            ${fmtR(v)}
          </td>`).join('')}
        <td style="${b}"><button class="del-btn" onclick="deleteFixed('${f.id}')" title="Remover">&times;</button></td>
      </tr>`).join('') + '</tbody>';
  }

  const totals = MESES.map((_, i) => fixedItems.reduce((s, f) => s + (f.values[i] || 0), 0));
  html += `<tfoot><tr>
    <td>Total mensal</td>
    ${totals.map(v => `<td style="text-align:right;color:${v > 0 ? 'var(--text)' : 'var(--text3)'};">${fmtR(v)}</td>`).join('')}
    <td></td>
  </tr></tfoot>`;
  t.innerHTML = html;
}

function renderChartFixed() {
  const wrap = document.getElementById('chart-wrap-fixos');
  if (fixedItems.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  if (chartFixInst) { chartFixInst.destroy(); chartFixInst = null; }
  const totals = MESES.map((_, i) => Math.round(fixedItems.reduce((s, f) => s + (f.values[i] || 0), 0) * 100) / 100);
  chartFixInst = new Chart(document.getElementById('chart-fixos'), {
    type: 'line',
    data: {
      labels: MESES,
      datasets: [{
        label: 'Total fixo',
        data: totals,
        borderColor: '#2ea043',
        backgroundColor: 'rgba(46,160,67,0.1)',
        borderWidth: 2,
        pointBackgroundColor: '#2ea043',
        pointRadius: 4,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#161b22', borderColor:'#30363d', borderWidth:1,
          titleColor:'#e6edf3', bodyColor:'#8b949e',
          callbacks: { label: ctx => `Total: R$\u00a0${ctx.raw.toFixed(2).replace('.', ',')}` }
        }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:11},color:'#8b949e'}, border:{color:'#30363d'} },
        y: { border:{display:false}, grid:{color:'#21262d'},
          ticks:{font:{size:11},color:'#8b949e', callback: v => 'R$' + v.toLocaleString('pt-BR')} }
      }
    }
  });
}
</script>

<script>

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let chartInst   = null;

    userId = user.uid;
    document.getElementById('login-screen').style.display = 'none';

});

function col() {
  return db.collection('users').doc(userId).collection('parcelas').doc(String(currentYear)).collection('items');
}

function startListening() {
  unsub = col().orderBy('createdAt', 'asc').onSnapshot(snap => {
    expenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
  startListeningFixed();
}

function setSaving(msg, active = false) {
  const el = document.getElementById('saving-indicator');
  el.textContent = msg;
  el.className = 'saving-indicator' + (active ? ' active' : '');
}

async function addExpense() {
  const desc     = document.getElementById('inp-desc').value.trim();
  const valor    = parseFloat(document.getElementById('inp-valor').value);
  const cartao   = document.getElementById('inp-cartao').value;
  const parcelas = Math.min(12, Math.max(1, parseInt(document.getElementById('inp-parcelas').value) || 1));
  const inicio   = parseInt(document.getElementById('inp-inicio').value);
  if (!desc || isNaN(valor) || valor <= 0) { document.getElementById('inp-desc').focus(); return; }
  const pv = Math.round(valor * 100) / 100;
  const values = Array(12).fill(0);
  for (let i = 0; i < parcelas && (inicio + i) < 12; i++) values[inicio + i] = pv;
  setSaving('Salvando…', true);
  try {
    await col().add({ desc, cartao, parcelas, inicio, values, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    setSaving('Salvo ✓', true);
    setTimeout(() => setSaving(''), 2000);
  } catch(e) { setSaving('Erro ao salvar.'); }
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-valor').value = '';
  document.getElementById('inp-parcelas').value = '1';
  document.getElementById('inp-desc').focus();
}

async function deleteExpense(id) {
  if (!confirm('Remover este gasto?')) return;
  setSaving('Removendo…', true);
  await col().doc(id).delete();
  setSaving('Removido ✓', true);
  setTimeout(() => setSaving(''), 2000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !['BUTTON','SELECT'].includes(document.activeElement.tagName)) addExpense();
});

function render() { renderMetrics(); renderTable(); renderChart(); }
function fmtR(v)   { return v > 0 ? 'R$&nbsp;' + v.toFixed(2).replace('.', ',') : '<span class="val-empty">—</span>'; }
function fmtRaw(v) { return 'R$\u00a0' + v.toFixed(2).replace('.', ','); }

function renderMetrics() {
  const totals   = MESES.map((_, i) => expenses.reduce((s, e) => s + (e.values[i] || 0), 0));
  const totalAno = totals.reduce((a, b) => a + b, 0);
  const mi       = new Date().getMonth();
  const maiorIdx = totals.indexOf(Math.max(...totals));
  document.getElementById('metrics').innerHTML = [
    ['Total ' + currentYear,     fmtRaw(totalAno)],
    [MESES[mi] + ' — atual',     fmtRaw(totals[mi])],
    ['Compras parceladas',        expenses.filter(e => e.parcelas > 1).length],
    ['Mês mais pesado',           totals[maiorIdx] > 0 ? MESES[maiorIdx] : '—'],
  ].map(([label, value]) => `
    <div class="metric-card">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
    </div>`).join('');
}

function renderTable() {
  const t = document.getElementById('main-table');
  const b = 'border-bottom:1px solid var(--border);';
  const thS = `font-size:11px;font-weight:600;color:var(--text2);padding:7px 8px;${b}`;
  let html = `<thead><tr>
    <th style="${thS}text-align:left;">Descrição</th>
    <th style="${thS}text-align:center;">Cartão</th>
    ${MESES.map(m => `<th style="${thS}text-align:right;">${m}</th>`).join('')}
    <th style="${b}width:24px;"></th>
  </tr></thead>`;
  if (expenses.length === 0) {
    html += `<tbody><tr><td colspan="${3+MESES.length}" class="empty-state">Nenhuma parcela em ${currentYear}. Adicione a primeira acima ↑</td></tr></tbody>`;
  } else {
    html += '<tbody>' + expenses.map(e => `
      <tr class="row-${e.cartao}">
        <td>${e.desc}${e.parcelas > 1 ? `<span class="badge-n">${e.parcelas}x</span>` : ''}</td>
        <td><span class="pill pill-${e.cartao}">${e.cartao}</span></td>
        ${e.values.map(v => `<td>${fmtR(v)}</td>`).join('')}
        <td><button class="del-btn" onclick="deleteExpense('${e.id}')" title="Remover">&times;</button></td>
      </tr>`).join('') + '</tbody>';
  }
  const totals = MESES.map((_, i) => expenses.reduce((s, e) => s + (e.values[i] || 0), 0));
  html += `<tfoot><tr>
    <td colspan="2">Total mensal</td>
    ${totals.map(v => `<td style="color:${v > 0 ? 'var(--text)' : 'var(--text3)'};">${fmtR(v)}</td>`).join('')}
    <td></td>
  </tr></tfoot>`;
  t.innerHTML = html;
}

function renderChart() {
  const wrap = document.getElementById('chart-wrap');
  if (expenses.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const active = CARTOES.filter(c => expenses.some(e => e.cartao === c));
  document.getElementById('legend').innerHTML = active.map(c =>
    `<span class="legend-item"><span class="legend-dot" style="background:${CHART_COLORS[c]}"></span>${c}</span>`
  ).join('');
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const datasets = CARTOES.map(cartao => ({
    label: cartao,
    data: MESES.map((_, i) => Math.round(expenses.filter(e => e.cartao === cartao).reduce((s, e) => s + (e.values[i] || 0), 0) * 100) / 100),
    backgroundColor: CHART_COLORS[cartao],
    borderRadius: 4, borderSkipped: false,
  })).filter(ds => ds.data.some(v => v > 0));
  chartInst = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels: MESES, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#161b22', borderColor:'#30363d', borderWidth:1,
          titleColor:'#e6edf3', bodyColor:'#8b949e',
          callbacks: { label: ctx => `${ctx.dataset.label}: R$\u00a0${ctx.raw.toFixed(2).replace('.', ',')}` }
        }
      },
      scales: {
        x: { stacked:true, grid:{display:false}, ticks:{font:{size:11},color:'#8b949e'}, border:{color:'#30363d'} },
        y: { stacked:true, border:{display:false}, grid:{color:'#21262d'},
          ticks:{font:{size:11},color:'#8b949e', callback: v => 'R$' + v.toLocaleString('pt-BR')} }
      }
    }
  });
}

// ── Gastos Fixos ───────────────────────────────────────────────
let fixedItems   = [];
let chartFixInst = null;
let unsubFixed   = null;

function colFixed() {
  return db.collection('users').doc(userId).collection('fixos').doc(String(currentYear)).collection('items');
}

function startListeningFixed() {
  if (unsubFixed) unsubFixed();
  unsubFixed = colFixed().orderBy('createdAt', 'asc').onSnapshot(snap => {
    fixedItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderFixed();
  });
}

async function addFixed() {
  const desc  = document.getElementById('fix-desc').value.trim();
  const valor = parseFloat(document.getElementById('fix-valor').value);
  if (!desc || isNaN(valor) || valor <= 0) { document.getElementById('fix-desc').focus(); return; }
  const pv     = Math.round(valor * 100) / 100;
  const values = Array(12).fill(pv);
  setSaving('Salvando…', true);
  try {
    await colFixed().add({ desc, defaultValue: pv, values, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    setSaving('Salvo ✓', true);
    setTimeout(() => setSaving(''), 2000);
  } catch(e) { setSaving('Erro ao salvar.'); }
  document.getElementById('fix-desc').value  = '';
  document.getElementById('fix-valor').value = '';
  document.getElementById('fix-desc').focus();
}

async function deleteFixed(id) {
  if (!confirm('Remover este gasto fixo?')) return;
  setSaving('Removendo…', true);
  await colFixed().doc(id).delete();
  setSaving('Removido ✓', true);
  setTimeout(() => setSaving(''), 2000);
}

async function updateFixedCell(id, monthIdx, newVal) {
  const item = fixedItems.find(f => f.id === id);
  if (!item) return;
  const values = [...item.values];
  values[monthIdx] = Math.round((parseFloat(newVal) || 0) * 100) / 100;
  setSaving('Salvando…', true);
  try {
    await colFixed().doc(id).update({ values });
    setSaving('Salvo ✓', true);
    setTimeout(() => setSaving(''), 2000);
  } catch(e) { setSaving('Erro ao salvar.'); }
}

function startEditCell(el, id, monthIdx, currentVal) {
  if (el.querySelector('input')) return;
  const inp = document.createElement('input');
  inp.type  = 'number';
  inp.step  = '0.01';
  inp.value = currentVal > 0 ? currentVal.toFixed(2) : '';
  inp.placeholder = '0,00';
  el.appendChild(inp);
  inp.focus();
  inp.select();
  function commit() {
    const v = parseFloat(inp.value);
    if (!isNaN(v) && v !== currentVal) updateFixedCell(id, monthIdx, v);
    inp.remove();
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { inp.blur(); }
    if (e.key === 'Escape') { inp.remove(); }
    e.stopPropagation();
  });
}

function renderFixed() {
  renderMetricsFixed();
  renderTableFixed();
  renderChartFixed();
}

function renderMetricsFixed() {
  const totals   = MESES.map((_, i) => fixedItems.reduce((s, f) => s + (f.values[i] || 0), 0));
  const totalAno = totals.reduce((a, b) => a + b, 0);
  const mi       = new Date().getMonth();
  const maiorIdx = totals.indexOf(Math.max(...totals));
  document.getElementById('metrics-fixos').innerHTML = [
    ['Total fixo ' + currentYear, fmtRaw(totalAno)],
    [MESES[mi] + ' — mês atual',  fmtRaw(totals[mi])],
    ['Contas cadastradas',         fixedItems.length],
    ['Mês mais pesado',            totals[maiorIdx] > 0 ? MESES[maiorIdx] : '—'],
  ].map(([label, value]) => `
    <div class="metric-card">
      <div class="label">${label}</div>
      <div class="value">${value}</div>
    </div>`).join('');
}

function renderTableFixed() {
  const t = document.getElementById('fixed-table');
  const b = 'border-bottom:1px solid var(--border);';
  const thS = `font-size:11px;font-weight:600;color:var(--text2);padding:7px 8px;${b}`;
  let html = `<thead><tr>
    <th style="${thS}text-align:left;">Descrição</th>
    ${MESES.map(m => `<th style="${thS}text-align:right;">${m}</th>`).join('')}
    <th style="${b}width:24px;"></th>
  </tr></thead>`;

  if (fixedItems.length === 0) {
    html += `<tbody><tr><td colspan="${2+MESES.length}" class="empty-state">Nenhum gasto fixo em ${currentYear}. Adicione o primeiro acima ↑</td></tr></tbody>`;
  } else {
    html += '<tbody>' + fixedItems.map(f => `
      <tr>
        <td style="${b}font-size:13px;">${f.desc}</td>
        ${f.values.map((v, i) => `
          <td class="editable-cell" style="${b}position:relative;" onclick="startEditCell(this,'${f.id}',${i},${v})">
            ${fmtR(v)}
          </td>`).join('')}
        <td style="${b}"><button class="del-btn" onclick="deleteFixed('${f.id}')" title="Remover">&times;</button></td>
      </tr>`).join('') + '</tbody>';
  }

  const totals = MESES.map((_, i) => fixedItems.reduce((s, f) => s + (f.values[i] || 0), 0));
  html += `<tfoot><tr>
    <td>Total mensal</td>
    ${totals.map(v => `<td style="text-align:right;color:${v > 0 ? 'var(--text)' : 'var(--text3)'};">${fmtR(v)}</td>`).join('')}
    <td></td>
  </tr></tfoot>`;
  t.innerHTML = html;
}

function renderChartFixed() {
  const wrap = document.getElementById('chart-wrap-fixos');
  if (fixedItems.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  if (chartFixInst) { chartFixInst.destroy(); chartFixInst = null; }
  const totals = MESES.map((_, i) => Math.round(fixedItems.reduce((s, f) => s + (f.values[i] || 0), 0) * 100) / 100);
  chartFixInst = new Chart(document.getElementById('chart-fixos'), {
    type: 'line',
    data: {
      labels: MESES,
      datasets: [{
        label: 'Total fixo',
        data: totals,
        borderColor: '#2ea043',
        backgroundColor: 'rgba(46,160,67,0.1)',
        borderWidth: 2,
        pointBackgroundColor: '#2ea043',
        pointRadius: 4,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#161b22', borderColor:'#30363d', borderWidth:1,
          titleColor:'#e6edf3', bodyColor:'#8b949e',
          callbacks: { label: ctx => `Total: R$\u00a0${ctx.raw.toFixed(2).replace('.', ',')}` }
        }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:11},color:'#8b949e'}, border:{color:'#30363d'} },
        y: { border:{display:false}, grid:{color:'#21262d'},
          ticks:{font:{size:11},color:'#8b949e', callback: v => 'R$' + v.toLocaleString('pt-BR')} }
      }
    }
  });
}
</script>
